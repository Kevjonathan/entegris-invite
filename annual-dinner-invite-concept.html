<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Entegris Annual Dinner Invitation — Around the World</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500;600&family=Courier+Prime:wght@400;700&display=swap');

  :root{
    --navy:#16223D;
    --navy-deep:#0E1729;
    --parchment:#F2E8D5;
    --parchment-dark:#E5D7B8;
    --gold:#C8893A;
    --postal-red:#A8362B;
    --ink:#2B2420;
    --ink-soft:#5C5346;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    min-height:100dvh;
    background:
      radial-gradient(circle at 20% 20%, rgba(200,137,58,0.08), transparent 40%),
      radial-gradient(circle at 80% 75%, rgba(200,137,58,0.06), transparent 45%),
      var(--navy);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    overflow-y:auto;
    position:relative;
    padding:20px 12px;
  }

  /* faint world-map / lat-long grid texture */
  .grid-bg{
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 64px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 64px);
    pointer-events:none;
  }

  /* animated flight path */
  .flight-path{
    position:absolute;
    width:140%;
    top:18%;
    left:-20%;
    height:1px;
    opacity:0.25;
    pointer-events:none;
  }
  .flight-path svg{width:100%; height:120px; display:block;}
  .flight-dash{
    stroke:var(--gold);
    stroke-width:1.5;
    stroke-dasharray:6 8;
    fill:none;
    stroke-dashoffset:0;
    animation:dashmove 20s linear infinite;
  }
  @keyframes dashmove{ to{ stroke-dashoffset:-400; } }
  .plane-icon{
    fill:var(--gold);
    offset-path: path('M -50 60 Q 400 -40 900 80');
    animation: flyplane 20s linear infinite;
  }
  @keyframes flyplane{
    0%{ offset-distance:0%; opacity:0; }
    5%{ opacity:0.9; }
    95%{ opacity:0.9; }
    100%{ offset-distance:100%; opacity:0; }
  }

  .stage{
    position:relative;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .hint{
    position:absolute;
    bottom:-40px;
    left:0; right:0;
    text-align:center;
    color:rgba(242,232,213,0.55);
    font-size:13px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:500;
    transition:opacity 0.4s ease;
  }

  /* ===== ENVELOPE ===== */
  .envelope-stack{
    position:relative;
    width:100%;
    max-width:640px;
    aspect-ratio:420/280;
  }
  .envelope-wrap{
    position:absolute;
    inset:0;
    cursor:pointer;
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  .envelope-wrap.dimmed{
    opacity:0;
    transform:scale(0.9);
    pointer-events:none;
  }
  .envelope-stack.hidden{
    display:none;
  }

  .envelope-body{
    position:absolute; inset:0;
    background:linear-gradient(165deg, var(--parchment) 0%, var(--parchment-dark) 100%);
    border-radius:6px;
    box-shadow:
      0 25px 50px -12px rgba(0,0,0,0.55),
      0 0 0 1px rgba(200,137,58,0.25);
    overflow:hidden;
  }

  .pocket-line{
    position:absolute;
    bottom:0; left:0; right:0; height:62%;
    background:linear-gradient(165deg, var(--parchment) 0%, var(--parchment-dark) 100%);
    clip-path:polygon(0 100%, 50% 30%, 100% 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .pocket-shade{
    position:absolute; bottom:0; left:0; right:0; height:62%;
    clip-path:polygon(0 100%, 50% 30%, 100% 100%);
    background:linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.06) 100%);
  }

  .stamp{
    position:absolute;
    top:18px; right:20px;
    width:54px; height:64px;
    background:repeating-linear-gradient(0deg, var(--postal-red) 0 2px, transparent 2px 4px),
               repeating-linear-gradient(90deg, var(--postal-red) 0 2px, transparent 2px 4px);
    background-color:#fbeede;
    border:2px dashed rgba(168,54,43,0.5);
    display:flex; align-items:center; justify-content:center;
    transform:rotate(4deg);
  }
  .stamp svg{ width:28px; height:28px; }

  .postmark{
    position:absolute;
    top:30px; left:24px;
    width:90px; height:90px;
    opacity:0.5;
    transform:rotate(-12deg);
  }

  .to-line{
    position:absolute;
    left:24px; top:96px;
    font-family:'Courier Prime', monospace;
    color:var(--ink-soft);
    font-size:13px;
    letter-spacing:0.04em;
  }
  .to-line .name{
    display:block;
    font-size:16px;
    color:var(--ink);
    margin-top:4px;
    font-weight:700;
  }

  /* flap */
  .flap{
    position:absolute;
    top:0; left:0; right:0; height:62%;
    background:linear-gradient(155deg, #EAD9B5 0%, var(--parchment-dark) 100%);
    clip-path:polygon(0 0, 100% 0, 50% 78%);
    transform-origin:top center;
    transition:transform 1.1s cubic-bezier(.65,0,.35,1);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    z-index:5;
  }
  .envelope-wrap.open .flap{
    transform:rotateX(180deg);
  }

  /* wax seal sits on the flap tip */
  .seal{
    position:absolute;
    left:50%; top:60%;
    transform:translate(-50%,-50%);
    width:62px; height:62px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #D89A4D, var(--gold) 60%, #9C6324 100%);
    box-shadow:0 4px 10px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
    z-index:6;
    transition: transform 0.6s ease, opacity 0.4s ease;
  }
  .seal svg{ width:30px; height:30px; }
  .envelope-wrap.open .seal{
    transform:translate(-50%,-50%) scale(0.4) rotate(35deg);
    opacity:0;
  }

  .click-pulse{
    position:absolute;
    left:50%; top:60%;
    transform:translate(-50%,-50%);
    width:62px; height:62px;
    border-radius:50%;
    border:2px solid rgba(200,137,58,0.6);
    animation:pulse 2.2s ease-out infinite;
    pointer-events:none;
  }
  @keyframes pulse{
    0%{ opacity:0.8; transform:translate(-50%,-50%) scale(1); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(1.9); }
  }

  /* ===== DESIGN REVEAL ===== */
  .reveal{
    width:min(82vw, 145vh);
    max-width:1400px;
    aspect-ratio:16/9;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 40px 80px -10px rgba(0,0,0,0.6);
    opacity:0;
    transform:scale(0.94) translateY(20px);
    transition:opacity 0.8s ease, transform 0.9s cubic-bezier(.2,.8,.2,1);
    pointer-events:none;
    position:absolute;
  }
  .reveal.show{
    position:relative;
    opacity:1;
    transform:scale(1) translateY(0);
    pointer-events:auto;
  }
  .reveal img{
    width:100%;
    height:100%;
    display:block;
    object-fit:contain;
    background:var(--navy-deep);
  }

  /* Portrait phones only: width is the limiting factor, not height — let it grow to fill available width */
  @media (orientation:portrait){
    .reveal{
      width:min(94vw, 1400px);
    }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.2s !important; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="flight-path">
  <svg viewBox="0 0 900 120" preserveAspectRatio="none">
    <path class="flight-dash" d="M -50 60 Q 400 -40 900 80"/>
    <g class="plane-icon">
      <svg x="0" y="0" width="18" height="18" viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V18l-3 2v1.5l4.5-1.5 4.5 1.5V20l-3-2v-4.5z"/></svg>
    </g>
  </svg>
</div>

<div class="stage">
  <div class="envelope-stack">
    <div class="envelope-wrap" id="envelope">
      <div class="postmark">
        <svg viewBox="0 0 90 90"><circle cx="45" cy="45" r="42" fill="none" stroke="#5C5346" stroke-width="1.5"/><circle cx="45" cy="45" r="35" fill="none" stroke="#5C5346" stroke-width="1"/><text x="45" y="30" text-anchor="middle" font-family="Courier Prime, monospace" font-size="8" fill="#5C5346" letter-spacing="1">PENANG</text><text x="45" y="62" text-anchor="middle" font-family="Courier Prime, monospace" font-size="8" fill="#5C5346">02 OCT 26</text></svg>
      </div>
      <div class="stamp">
        <svg viewBox="0 0 24 24"><path fill="#A8362B" d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V18l-3 2v1.5l4.5-1.5 4.5 1.5V20l-3-2v-4.5z"/></svg>
      </div>
      <div class="to-line">
        To:
        <span class="name">Our Valued Team</span>
      </div>
      <div class="pocket-shade"></div>
      <div class="pocket-line"></div>
      <div class="envelope-body"></div>
      <div class="flap"></div>
      <div class="click-pulse"></div>
      <div class="seal">
        <svg viewBox="0 0 24 24"><path fill="#16223D" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><path fill="#16223D" d="M12 6l1.5 4.5H18l-3.7 2.7 1.4 4.5L12 15l-3.7 2.7 1.4-4.5L6 10.5h4.5z"/></svg>
      </div>
    </div>
  </div>

  <div class="reveal" id="reveal">
    <img src="entegris.jpg" alt="Entegris Annual Dinner 2026 — Around the World Invitation">
  </div>

  <p class="hint" id="hint">Click the envelope to open</p>
</div>

<script>
  const envelope = document.getElementById('envelope');
  const reveal = document.getElementById('reveal');
  const hint = document.getElementById('hint');
  let opened = false;

  envelope.addEventListener('click', () => {
    if (opened) return;
    opened = true;
    envelope.classList.add('open');
    hint.textContent = 'Opening your invitation…';
    setTimeout(() => {
      document.querySelector('.envelope-stack').classList.add('hidden');
      reveal.classList.add('show');
      hint.style.opacity = '0';
    }, 650);
  });
</script>

</body>
</html>
